version: 2

models:
  - name: stg_orders
    description: "Staging model for orders, cleaning and preparing raw order data."
    columns:
      - name: order_id
        tests:
          - unique
          - not_null
      - name: order_date
        tests:
          - not_null
      - name: order_time
        tests:
          - not_null
    tests:
      - dbt_utils.equal_row_count:
          compare_model: source('pizza_raw_data', 'orders')

  - name: stg_order_details
    description: "Staging model for order details, ensuring data quality and consistency."
    columns:
      - name: order_detail_id
        tests:
          - unique
          - not_null
      - name: order_id
        tests:
          - not_null
      - name: quantity
        tests:
          - not_null
    tests:
      - dbt_utils.equal_row_count:
          compare_model: source('pizza_raw_data', 'order_details')

  - name: stg_pizzas
    description: "Staging model for pizzas, standardizing pizza data for further analysis."
    columns:
      - name: pizza_id
        tests:
          - unique
          - not_null
      - name: price
        tests:
          - not_null
      - name: size
        tests:
          - not_null
    tests:
      - dbt_utils.equal_row_count:
          compare_model: source('pizza_raw_data', 'pizzas')

  - name: stg_pizza_types
    description: "Staging model for pizza types, ensuring data integrity and consistency."
    columns:
      - name: pizza_type_id
        tests:
          - unique
          - not_null
      - name: pizza_name
        tests:
          - not_null
      - name: category
        tests:
          - not_null
      - name: ingredients
        tests:
          - not_null
    tests:
      - dbt_utils.equal_row_count:
          compare_model: source('pizza_raw_data', 'pizza_types')